name: Sync live FLLM site

on:
  push:
    branches:
      - agent/sync-live-site
    paths:
      - .github/workflows/sync-live-site.yml

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Mirror live pages and assets
        run: |
          cat > /tmp/mirror.py <<'PY'
          from pathlib import Path
          from urllib.parse import urljoin, urlparse
          import re, urllib.request, shutil

          BASE = 'https://www.floridaliquorlicensemarket.com'
          ROUTES = [
              '/', '/listings', '/sell-your-license', '/financing',
              '/investment-opportunities', '/contact',
              '/financing-disclosure', '/private-lending-disclosure',
              '/privacy-policy', '/terms-of-use'
          ]
          root = Path('public')
          if root.exists(): shutil.rmtree(root)
          root.mkdir()

          headers = {'User-Agent': 'Mozilla/5.0 FLLM repository sync'}
          def get(url):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=45) as r:
                  return r.read(), r.headers.get_content_type()

          queue, seen = [], set()
          asset_pat = re.compile(r'''(?:https://www\.floridaliquorlicensemarket\.com)?(/(?:assets|favicon)[^"'<>\s)]+)''')
          rel_import_pat = re.compile(r'''(?:from\s*|import\s*\()?['"](\./[^'"]+)['"]''')

          def enqueue(path):
              path = path.split('#',1)[0].split('?',1)[0].rstrip('\\')
              if path.startswith('/') and path not in seen:
                  seen.add(path); queue.append(path)

          for route in ROUTES:
              data, _ = get(BASE + route)
              out = root / ('index.html' if route == '/' else route.strip('/') + '/index.html')
              out.parent.mkdir(parents=True, exist_ok=True)
              out.write_bytes(data)
              for m in asset_pat.finditer(data.decode('utf-8', 'ignore')): enqueue(m.group(1))

          while queue:
              path = queue.pop(0)
              try:
                  data, ctype = get(BASE + path)
              except Exception as exc:
                  print('WARN', path, exc)
                  continue
              out = root / path.lstrip('/')
              out.parent.mkdir(parents=True, exist_ok=True)
              out.write_bytes(data)
              if ctype.startswith('text/') or path.endswith(('.js','.css','.json','.svg','.html')):
                  text = data.decode('utf-8', 'ignore')
                  for m in asset_pat.finditer(text): enqueue(m.group(1))
                  if path.startswith('/assets/') and path.endswith('.js'):
                      base_dir = path.rsplit('/',1)[0] + '/'
                      for m in rel_import_pat.finditer(text):
                          enqueue(urlparse(urljoin(BASE + base_dir, m.group(1))).path)

          for p in root.rglob('*'):
              if p.is_file() and p.suffix in {'.html','.js','.css','.json'}:
                  text = p.read_text('utf-8', errors='ignore')
                  text = text.replace('2COP Quota', '4COP Quota')
                  text = text.replace('3COP License', '3PS Quota / Package Store')
                  text = text.replace('2COP Beer &amp; Wine', '')
                  text = text.replace('2COP Beer & Wine', '')
                  text = text.replace('Specialty / Qualified Business License', '')
                  text = text.replace('<option value=""></option>', '')
                  p.write_text(text, encoding='utf-8')

          css = root / 'assets/index-DsiZO1T9.css'
          if css.exists():
              css.write_text(css.read_text('utf-8') + '\nselect option[value=""]{display:none!important}\n', encoding='utf-8')

          (root / '.nojekyll').write_text('')
          print('Mirrored', len(list(root.rglob('*'))), 'paths')
          PY
          python /tmp/mirror.py
      - name: Verify synchronized Next.js build
        shell: bash
        run: |
          set +e
          npm install > build-install.log 2>&1
          install_status=$?
          npm run build > build-output.log 2>&1
          build_status=$?
          mkdir -p .diagnostics
          mv build-install.log build-output.log .diagnostics/
          printf 'install_status=%s\nbuild_status=%s\n' "$install_status" "$build_status" > .diagnostics/build-status.txt
          exit 0
      - name: Commit synchronized site and diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A public .diagnostics
          git commit -m "Refresh live-site mirror and build diagnostics" || exit 0
          git push
